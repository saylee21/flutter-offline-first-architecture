name: flutter_offline_first_architecture
description: >-
  Reference architecture for offline-first Flutter applications
  using Isar, background sync queue, and clean architecture with GetX.

publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  connectivity_plus: ^6.1.0
  workmanager: ^0.5.2
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.0
